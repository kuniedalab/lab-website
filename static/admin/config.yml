backend:
  name: github
  repo: kuniedalab/lab-website
  branch: main
  base_url: https://kuniedalab.org
  auth_endpoint: api/auth

media_folder: "assets/media"
public_folder: "/media"

collections:

  # ────────────────────────────
  # ニュース・お知らせ（英語）
  # ────────────────────────────
  - name: "news-en"
    label: "News (English)"
    folder: "content/en/news"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    path: "{{slug}}/index"          # ← サブフォルダ内のindex.mdを対象に
    extension: "md"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Date", name: "date", widget: "datetime"}
      - {label: "Authors", name: "authors", widget: "list"}
      - label: "Featured image"
        name: "image"
        widget: "object"
        required: false
        fields:
          - label: "Image File"
            name: "filename"
            widget: "image"
            required: false
            media_folder: ""              # ← 空にすると記事フォルダ内に画像保存
            public_folder: ""             # ← 同上
            choose_url: true
            hint: "Filename should be 'featured.jpg'."
          - label: "Focal Point"
            name: "focal_point"
            widget: "select"
            required: false
            default: "Smart"
            options:
              - {label: "Smart (Auto)", value: "Smart"}
              - {label: "Center", value: "Center"}
              - {label: "Top", value: "Top"}
              - {label: "Bottom", value: "Bottom"}
              - {label: "Left", value: "Left"}
              - {label: "Right", value: "Right"}
              - {label: "TopLeft", value: "TopLeft"}
              - {label: "TopRight", value: "TopRight"}
              - {label: "BottomLeft", value: "BottomLeft"}
              - {label: "BottomRight", value: "BottomRight"}
#      - {label: "Summary", name: "summary", widget: "text", required: false}
#      - {label: "Tags", name: "tags", widget: "list", required: false}
      - {label: "Body", name: "body", widget: "markdown"}

  # ────────────────────────────
  # ニュース・お知らせ（日本語）
  # ────────────────────────────
  - name: "news-ja"
    label: "ニュース（日本語）"
    folder: "content/ja/news"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    path: "{{slug}}/index"          # ← サブフォルダ内のindex.mdを対象に
    extension: "md"
    fields:
      - {label: "タイトル", name: "title", widget: "string"}
      - {label: "日付", name: "date", widget: "datetime"}
      - {label: "著者", name: "authors", widget: "list"}
      - label: "Featured image"
        name: "image"
        widget: "object"
        required: false
        fields:
          - label: "Image File"
            name: "filename"
            widget: "image"
            required: false
            media_folder: ""              # ← 空にすると記事フォルダ内に画像保存
            public_folder: ""             # ← 同上
            choose_url: true
            hint: "ファイル名はfeatured.jpgにしてください"
          - label: "Focal Point"
            name: "focal_point"
            widget: "select"
            required: false
            default: "Smart"
            options:
              - {label: "Smart (自動)", value: "Smart"}
              - {label: "Center (中央)", value: "Center"}
              - {label: "Top (上)", value: "Top"}
              - {label: "Bottom (下)", value: "Bottom"}
              - {label: "Left (左)", value: "Left"}
              - {label: "Right (右)", value: "Right"}
              - {label: "TopLeft (左上)", value: "TopLeft"}
              - {label: "TopRight (右上)", value: "TopRight"}
              - {label: "BottomLeft (左下)", value: "BottomLeft"}
              - {label: "BottomRight (右下)", value: "BottomRight"}
#        - label: "Featured Image"
#          name: "featured"
#          widget: "image"
#          required: false
#          media_folder: ""              # ← 空にすると記事フォルダ内に画像保存
#          public_folder: ""             # ← 同上
#          hint: "アップロード後、ファイル名をfeatured.jpgにリネームしてください"
#      - {label: "概要", name: "summary", widget: "text", required: false}
#      - {label: "タグ", name: "tags", widget: "list", required: false}
      - {label: "本文", name: "body", widget: "markdown"}

  # ────────────────────────────
  # メンバー（英語）
  # ────────────────────────────
  - name: "authors-en"
    label: "Members (English)"
    folder: "content/en/authors"
    create: true
    slug: "{{slug}}"
    path: "{{slug}}/_index"          # ← 同様に
    extension: "md"
    fields:
      - {label: "Name", name: "title", widget: "string"}
      - {label: "Role / Position", name: "role", widget: "string", required: false}
      - {label: "Bio", name: "bio", widget: "text", required: false}
      - {label: "Avatar filename", name: "avatar_filename", widget: "string",
         default: "avatar.jpg", required: false,
         hint: "Place avatar.jpg in the same folder as this file"}
      - label: "Social links"
        name: "social"
        widget: "list"
        required: false
        fields:
          - {label: "Icon (e.g. envelope, twitter, github)", name: "icon", widget: "string"}
          - {label: "Icon pack (fas / fab / ai)", name: "icon_pack", widget: "string", default: "fas"}
          - {label: "Link URL", name: "link", widget: "string"}
      - {label: "Body (long bio / free text)", name: "body", widget: "markdown", required: false}

  # ────────────────────────────
  # メンバー（日本語）
  # ────────────────────────────
  - name: "authors-ja"
    label: "メンバー（日本語）"
    folder: "content/ja/authors"
    create: true
    slug: "{{slug}}"
    path: "{{slug}}/_index"          # ← 同様に
    extension: "md"
    fields:
      - {label: "氏名", name: "title", widget: "string"}
      - {label: "英名", name: "name", widget: "string"}
      - {label: "役職", name: "role", widget: "string", required: false}
      - {label: "グループ", name: "user_groups", widget: "string", required: false}
      - {label: "表示順（スタッフ 10-30; 研究員 40-50; 大学院生 100-130;）", name: "weight", widget: "string", required: false}
      - {label: "自己紹介（短）", name: "bio", widget: "text", required: false}
      - {label: "アバター画像ファイル名", name: "avatar_filename", widget: "string",
         default: "avatar.jpg", required: false,
         hint: "avatar.jpg をこのフォルダと同じ場所に置いてください"}
      - label: "所属機関"
        name: "organizations"
        widget: "list"
        required: false
        fields:
          - {label: "名称", name: "name", widget: "string", required: false}
          - {label: "URL", name: "url", widget: "string", required: false}
      - {label: "興味・関心のある分野", name: "interests", widget: "list", required: false}
#      - label: "興味・関心のある分野"
#        name: "interests"
#        widget: "list"
#        required: false
#        fields:
#          - {label: "分野", widget: "string"}
      - label: "教育歴"
        name: "education"
        widget: "list"
        required: false
        fields:
        - label: "学位"
          name: "courses"
          widget: "list"
          required: false
          fields:
            - {label: "学位", name: "course", widget: "string"}
            - {label: "機関", name: "institution", widget: "string"}
            - {label: "年", name: "year", widget: "string"}
      - label: "Social links"
        name: "social"
        widget: "list"
        required: false
        fields:
          - {label: "Icon (e.g. envelope, twitter, github)", name: "icon", widget: "string"}
          - {label: "Icon pack (fas / fab / ai)", name: "icon_pack", widget: "string", default: "fas"}
          - {label: "Link URL", name: "link", widget: "string"}
      - {label: "本文（長い紹介文など）", name: "body", widget: "markdown", required: false}
